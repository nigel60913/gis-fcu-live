<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GIS.FCU Live｜現場互動</title>
<link rel="icon" href="assets/logo.png" />
<link rel="stylesheet" href="css/style.css" />
<style>
  .status-dot { display:inline-flex; align-items:center; gap:6px; }
  .status-dot::before { content:''; width:7px; height:7px; border-radius:50%; background: var(--lime-500); }
  .rank-item {
    display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:var(--radius-md);
    border:1.5px solid var(--line); background:#fff; margin-bottom:10px; cursor:pointer;
  }
  .rank-item.picked { border-color: var(--navy-800); background: var(--blue-100); }
  .rank-badge {
    flex:0 0 26px; height:26px; border-radius:50%; background:var(--blue-100); color:var(--navy-800);
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;
  }
  .rank-item.picked .rank-badge { background: var(--navy-800); color:#fff; }
  .nick-gate { max-width: 340px; margin: 60px auto; text-align:center; }
  textarea#wcInput { resize:none; }
</style>
</head>
<body>
<div class="contour-bg"></div>
<div class="topbar">
  <div class="brand">
    <img class="logo" src="assets/logo.png" alt="GIS.FCU" />
    <div class="divider"></div>
    <div class="title">現場互動</div>
  </div>
  <span id="stateTag" class="pill">連線中</span>
</div>

<div class="stage" id="stage">
  <!-- 動態內容由 audience.js 產生 -->
</div>

<script type="module" src="js/audience.js"></script>
<script type="module" src="js/wordcloud-submit-fix.js"></script>
</body>
</html>
