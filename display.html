<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIS.FCU Live｜大螢幕</title>
<link rel="icon" href="assets/logo.png" />
<link rel="stylesheet" href="css/style.css" />
<style>
  body { overflow: hidden; }
  .screen { height: 100vh; display: flex; flex-direction: column; }
  .dtop {
    display:flex; align-items:center; justify-content:space-between;
    padding: 28px 48px; flex: 0 0 auto;
  }
  .dtop img.logo { height: 40px; }
  .dcount { font-family: var(--font-display); font-size: 15px; color: var(--blue-600); font-weight:700; }
  .dmain { flex: 1; padding: 0 64px 48px; display:flex; flex-direction:column; min-height:0; }
  .dq-eyebrow { font-size: 16px; }
  .dq-title { font-size: 44px; font-weight: 900; margin-top: 16px; line-height: 1.3; letter-spacing:-0.01em; }
  .dresults { flex: 1; margin-top: 32px; min-height: 0; display:flex; flex-direction:column; justify-content:center; }
  .big-bar-row { margin-bottom: 22px; }
  .big-bar-row .lab { display:flex; justify-content:space-between; font-size:22px; font-weight:700; margin-bottom:8px; }
  .big-bar-track { height: 30px; border-radius:999px; background: var(--blue-100); overflow:hidden; }
  .big-bar-fill { height:100%; border-radius:999px; background: linear-gradient(90deg, var(--blue-600), var(--navy-800)); transition: width .7s cubic-bezier(.2,.8,.2,1); }
  .big-bar-row.correct .big-bar-fill { background: linear-gradient(90deg, var(--lime-500), var(--lime-600)); }
  .rank-medal { display:inline-block; width:34px; }
  #wcCanvas { width: 100%; height: 100%; }
  .idle-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .idle-wrap img { height: 64px; margin-bottom: 24px; }
  .idle-wrap h1 { font-size: 34px; }
  .revealed-tag { margin-top: 6px; }
</style>
</head>
<body>
<div class="contour-bg"></div>
<div class="screen" id="screen">
  <!-- 由 display.js 動態產生 -->
</div>
<script type="module" src="js/display.js"></script>
</body>
</html>
