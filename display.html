<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIS.FCU Live｜大螢幕</title>
<link rel="icon" href="assets/logo.png" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { overflow: hidden; }
  .screen { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
  .dtop {
    display:flex; align-items:center; justify-content:space-between;
    padding: clamp(18px, 3vh, 28px) clamp(28px, 4vw, 52px); flex: 0 0 auto;
  }
  .dtop img.logo { height: clamp(30px, 4vh, 42px); }
  .dcount { font-family: var(--font-display); font-size: clamp(15px, 1.4vw, 21px); color: var(--blue-600); font-weight:700; }
  .dmain { flex: 1; padding: 0 clamp(36px, 5vw, 72px) clamp(24px, 4vh, 48px); display:flex; flex-direction:column; min-height:0; }
  .dq-eyebrow { font-size: clamp(13px, 1.2vw, 17px); }
  .dq-title { font-size: clamp(28px, 3.4vw, 50px); font-weight: 900; margin-top: 14px; line-height: 1.28; letter-spacing:-0.01em; }
  .dresults { flex: 1; margin-top: clamp(18px, 3vh, 32px); min-height: 0; display:flex; flex-direction:column; justify-content:center; }
  .big-bar-row { margin-bottom: clamp(8px, 1.55vh, 19px); }
  .big-bar-row .lab { display:flex; justify-content:space-between; gap:24px; font-size:clamp(16px, 1.65vw, 24px); font-weight:700; margin-bottom:6px; }
  .big-bar-row .lab > span:first-child { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .big-bar-track { height: clamp(18px, 2.5vh, 30px); border-radius:999px; background: var(--blue-100); overflow:hidden; }
  .big-bar-fill { height:100%; border-radius:999px; background: linear-gradient(90deg, var(--blue-600), var(--navy-800)); transition: width .7s cubic-bezier(.2,.8,.2,1); }
  .big-bar-row.correct .big-bar-fill { background: linear-gradient(90deg, var(--lime-500), var(--lime-600)); }
  .rank-medal { display:inline-block; width:38px; }
  #wcCanvas { width: 100%; height: 100%; min-height: 300px; }
  .idle-wrap, .hold-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 32px; }
  .idle-wrap img { height: clamp(48px, 7vh, 72px); margin-bottom: 20px; }
  .idle-wrap h1, .hold-wrap h2 { font-size: clamp(30px, 3.5vw, 50px); }
  .idle-wrap .join-grid { display:flex; align-items:center; gap:32px; margin-top:28px; text-align:left; }
  .idle-wrap .qr-card { background:#fff; padding:14px; border-radius:18px; box-shadow:var(--shadow-soft); }
  .join-url { font-size:clamp(15px,1.6vw,22px); font-weight:700; color:var(--navy-800); margin-top:8px; word-break:break-all; }
  .hold-icon { font-size: clamp(50px, 7vw, 90px); margin-bottom:18px; }
  .hold-wrap p { font-size:clamp(16px,1.6vw,23px); margin-top:12px; }
  .rank-sub { text-align:right; font-size:clamp(13px,1.1vw,17px); color:#6E8AA0; margin-top:4px; }
  .buzzer-board { margin-bottom:24px; padding:18px 24px; border-radius:20px; background:var(--lime-100); }
  .buzzer-title { font-size:clamp(19px,1.8vw,27px); font-weight:900; margin-bottom:12px; }
  .buzzer-row { display:grid; grid-template-columns:56px 1fr auto; gap:14px; align-items:center; padding:8px 0; font-size:clamp(16px,1.5vw,22px); }
  .buzzer-name { font-weight:800; }
  .buzzer-time { color:var(--blue-600); }
  @media (max-width: 760px) {
    .idle-wrap .join-grid { flex-direction:column; text-align:center; }
    .dmain { padding-left:24px; padding-right:24px; }
  }
</style>
</head>
<body>
<div class="contour-bg"></div>
<div class="screen" id="screen">
  <!-- 由 display.js 動態產生 -->
</div>
<script type="module" src="js/display.js"></script>
</body>
</html>
