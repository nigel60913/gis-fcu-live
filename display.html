<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#073B5C">
  <title>ESG × MM｜Live Display</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="./css/v2.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="display-body">
  <div id="network" class="network" hidden></div>
  <div class="display-idle" hidden></div>
  <div class="join-layout" hidden></div>
  <div class="display-live-meta" hidden></div>

  <main id="screen" class="display-screen">
    <section class="esg-lobby">
      <div class="lobby-aurora" aria-hidden="true"><i></i><i></i><i></i></div>
      <div class="lobby-grid" aria-hidden="true"></div>
      <div class="lobby-orbit" aria-hidden="true"><i></i><i></i><i></i></div>

      <header class="lobby-head display-top">
        <div class="display-brand lobby-brand">
          <img class="brand-logo" src="assets/logo.png" alt="GIS.FCU">
          <span>ESG × MM<small>LIVE ENGAGEMENT</small></span>
        </div>
        <div class="lobby-status"><i></i><span>等待開始</span></div>
      </header>

      <div class="lobby-content display-main">
        <div class="lobby-copy">
          <span class="lobby-kicker">TOGETHER FOR A BETTER FUTURE</span>
          <h1 class="display-title">聽見聲音</h1>
          <h1 class="display-title">Think Together</h1>
          <h1 class="display-title"><nobr><em>一起描繪集團的下一步</em></nobr></h1>
          <p>活動即將開始，掃描 QR Code 加入即時互動，<br>和我們一起為永續未來發聲。</p>
          <div class="esg-pillars display-results">
            <article><b>E</b><span><strong>ENVIRONMENT</strong>環境永續</span></article>
            <article><b>S</b><span><strong>SOCIAL</strong>社會共好</span></article>
            <article><b>G</b><span><strong>GOVERNANCE</strong>責任治理</span></article>
          </div>
        </div>

        <aside class="lobby-join">
          <div class="lobby-qr-frame">
            <div id="joinQr" class="join-qr"></div>
            <span class="qr-corner qr-corner-a"></span>
            <span class="qr-corner qr-corner-b"></span>
          </div>
          <span class="eyebrow">SCAN TO JOIN</span>
          <h2>掃描加入活動</h2>
          <p>正在載入加入連結…</p>
          <div class="join-pulse"><i></i><span>Live session is ready</span></div>
        </aside>
      </div>

      <footer class="lobby-footer">
        <span>ESG × MM INTERACTIVE EXPERIENCE</span>
        <span>活動即將開始</span>
      </footer>
    </section>
  </main>

  <script type="module" src="js/display.js?v=2.5.1"></script>
</body>
</html>
